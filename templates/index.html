<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PRAHAR</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 30px; background: #0d1117; color: white; }
        h1 { color: #00ff88; }
        h2 { color: #00aaff; margin-top: 40px; }
        input, button { padding: 10px; font-size: 14px; }
        input[type="text"] { width: 400px; }
        button { background: #00ff88; border: none; cursor: pointer; font-weight: bold; }

        .result-card { margin-top: 20px; padding: 20px; border-radius: 8px; max-width: 600px; }
        .REAL { background: #1a3a2a; border: 2px solid #00ff88; }
        .FAKE { background: #3a1a1a; border: 2px solid #ff3b3b; }
        .badge { padding: 5px 15px; border-radius: 20px; font-weight: bold; display: inline-block; margin-bottom: 10px; }
        .badge-REAL { background: #00ff88; color: black; }
        .badge-FAKE { background: #ff3b3b; color: white; }
        .entity { display: inline-block; padding: 3px 10px; margin: 3px; border-radius: 4px; font-size: 12px; }
        .LOC { background: #1a3a5a; border: 1px solid #00aaff; }
        .ORG { background: #3a2a5a; border: 1px solid #aa00ff; }
        .PER { background: #3a3a1a; border: 1px solid #ffaa00; }
        .MISC { background: #2a3a2a; border: 1px solid #00aa55; }

        /* Audio section */
        .audio-section { margin-top: 40px; max-width: 600px; }
        .confidence-bar-bg { background: #1a2a1a; border-radius: 4px; height: 20px; margin: 5px 0; }
        .confidence-bar { height: 20px; border-radius: 4px; background: #00ff88; transition: width 0.4s; }
        .audio-result { margin-top: 20px; padding: 20px; background: #0d1a0d; border: 1px solid #1e3040; border-radius: 8px; }
        .predicted-label { font-size: 1.5rem; font-weight: bold; color: #00ff88; margin-bottom: 10px; }
    </style>
   <script src="/static/js/chart.min.js"></script>
</head>
<body>
    <h1>⬡ PRAHAR Dashboard</h1>
    <p style="color: #5a7a8a;">Predictive Reconnaissance & AI-based Hazard Analysis</p>

    <!-- M1 Section -->
    <h2>M1 — Misinfo Radar</h2>
    <div>
        <input type="text" id="headline-input" placeholder="Enter a defense headline..." />
        <button onclick="analyzeHeadline()">ANALYZE</button>
    </div>
    <div id="result"></div>

    <!-- M2 Section -->
<h2>M2 — Deepfake Shield</h2>
<div class="audio-section">
    <input type="file" id="video-input" accept=".mp4,.avi,.mov" />
    <button onclick="analyzeVideo()">ANALYZE VIDEO</button>
    <div id="video-result"></div>
    <canvas id="frameChart" style="display:none; margin-top:20px; max-width:700px;"></canvas>
</div>

    <!-- M3 Section -->
    <h2>M3 — AcousticID</h2>
    <div class="audio-section">
        <input type="file" id="audio-input" accept=".mp3,.wav" />
        <button onclick="analyzeAudio()">CLASSIFY AUDIO</button>
        <div id="audio-result"></div>
    </div>


    <!-- M4 Section -->
    <h2>M4 — Object Detection (YOLO)</h2>
    <div class="audio-section">
        <input type="file" id="image-input" accept=".jpg,.jpeg,.png" />
        <button onclick="analyzeImage()">DETECT OBJECTS</button>
        <div id="image-result"></div>
        <canvas id="imageCanvas" style="display:none; margin-top:15px; max-width:700px; border:1px solid #1e3040;"></canvas>
    </div>


    <script>
        // M1 - Headline Analysis
        async function analyzeHeadline() {
            const text = document.getElementById('headline-input').value;
            if (!text) return;
            document.getElementById('result').innerHTML = '<p style="color:#5a7a8a">Analyzing...</p>';
            const res = await fetch(`/api/analyze?text=${encodeURIComponent(text)}`);
            const data = await res.json();
            const label = data.finetuned.label;
            const score = (data.finetuned.score * 100).toFixed(1);
            const entities = data.entities;
            let entitiesHTML = entities.map(e =>
                `<span class="entity ${e.type}">${e.word} <small>${e.type}</small></span>`
            ).join('');
            document.getElementById('result').innerHTML = `
                <div class="result-card ${label}">
                    <span class="badge badge-${label}">${label}</span>
                    <div style="font-size: 24px; font-weight: bold; margin-bottom: 10px;">${score}% confidence</div>
                    <div style="color: #aaa; margin-bottom: 15px;">${text}</div>
                    <div><strong>Entities:</strong><br/>${entitiesHTML || 'None'}</div>
                    <div style="margin-top: 15px; font-size: 12px; color: #5a7a8a;">
                        Zero-shot: ${data.zeroshot.label} (${(data.zeroshot.score * 100).toFixed(1)}%)
                    </div>
                </div>
            `;
        }

        document.getElementById('headline-input').addEventListener('keydown', e => {
            if (e.key === 'Enter') analyzeHeadline();
        });

        // M2- DeepFake Detection
        let frameChart = null;

async function analyzeVideo() {
    const fileInput = document.getElementById('video-input');
    if (!fileInput.files[0]) {
        alert('Please select a video file first!');
        return;
    }

    document.getElementById('video-result').innerHTML = '<p style="color:#5a7a8a">Analyzing video... this may take a minute...</p>';
    document.getElementById('frameChart').style.display = 'none';

    const formData = new FormData();
    formData.append('file', fileInput.files[0]);

    const res = await fetch('/api/video', { method: 'POST', body: formData });
    const data = await res.json();

    const label = data.final_label;
    const color = label === 'FAKE' ? '#ff3b3b' : '#00ff88';
    const flagged = data.avg_fake > 60;

    document.getElementById('video-result').innerHTML = `
        <div class="audio-result" style="border-color: ${color}; margin-top:15px;">
            <div class="predicted-label" style="color:${color};">
                ${label === 'FAKE' ? '⚠️' : '✅'} ${label}
                ${flagged ? '<span style="background:#ff3b3b; color:white; padding:3px 10px; border-radius:4px; font-size:12px; margin-left:10px;">FLAGGED</span>' : ''}
            </div>
            <div style="color:#aaa; margin-bottom:10px;">
                Frames analyzed: ${data.frames_processed} | 
                Real: ${data.avg_real}% | 
                Fake: ${data.avg_fake}%
            </div>
        </div>
    `;

    // Draw frame chart
    const frames = data.frame_results.map(f => `Frame ${f.frame}`);
    const scores = data.frame_results.map(f => f.fake_score);

    const canvas = document.getElementById('frameChart');
    canvas.style.display = 'block';

    if (frameChart) frameChart.destroy();

    frameChart = new Chart(canvas, {
        type: 'line',
        data: {
            labels: frames,
            datasets: [{
                label: 'Fake Score %',
                data: scores,
                borderColor: '#ff3b3b',
                backgroundColor: 'rgba(255,59,59,0.1)',
                tension: 0.3,
                fill: true
            }]
        },
        options: {
            plugins: { legend: { labels: { color: '#c8dde8' } } },
            scales: {
                x: { ticks: { color: '#5a7a8a', maxTicksLimit: 10 }, grid: { color: '#1e3040' } },
                y: { min: 0, max: 100, ticks: { color: '#5a7a8a' }, grid: { color: '#1e3040' } }
            }
        }
    });
}
        // M3 - Audio Classification
        async function analyzeAudio() {
            const fileInput = document.getElementById('audio-input');
            if (!fileInput.files[0]) {
                alert('Please select an audio file first!');
                return;
            }

            document.getElementById('audio-result').innerHTML = '<p style="color:#5a7a8a">Classifying audio...</p>';

            const formData = new FormData();
            formData.append('file', fileInput.files[0]);

            const res = await fetch('/api/audio', { method: 'POST', body: formData });
            const data = await res.json();

            const scores = data.all_scores;
            const barsHTML = Object.entries(scores).map(([cat, score]) => `
                <div style="margin: 8px 0;">
                    <div style="display:flex; justify-content:space-between;">
                        <span>${cat.toUpperCase()}</span>
                        <span>${score}%</span>
                    </div>
                    <div class="confidence-bar-bg">
                        <div class="confidence-bar" style="width:${score}%"></div>
                    </div>
                </div>
            `).join('');

            document.getElementById('audio-result').innerHTML = `
                <div class="audio-result">
                    <div class="predicted-label">🔊 ${data.predicted_class.toUpperCase()}</div>
                    <div style="color:#aaa; margin-bottom:15px;">Confidence: ${data.confidence}%</div>
                    ${barsHTML}
                </div>
            `;
        }

        // M4 - Image Object Detection
        async function analyzeImage() {
            const fileInput = document.getElementById('image-input');
            if (!fileInput.files[0]) {
                alert('Please select an image file first!');
                return;
            }

            document.getElementById('image-result').innerHTML = '<p style="color:#5a7a8a">Detecting objects...</p>';
            document.getElementById('imageCanvas').style.display = 'none';

            const file = fileInput.files[0];
            const formData = new FormData();
            formData.append('image', file);

            const res = await fetch('/api/image', { method: 'POST', body: formData });
            const data = await res.json();

            // Load the image into an <img> to get natural dimensions
            const img = new Image();
            img.src = URL.createObjectURL(file);
            img.onload = () => {
                const canvas = document.getElementById('imageCanvas');
                canvas.width = img.width;
                canvas.height = img.height;
                canvas.style.display = 'block';
                const ctx = canvas.getContext('2d');
                ctx.drawImage(img, 0, 0, img.width, img.height);

                // data.detections expected as list of {class, confidence, bbox:[x1,y1,x2,y2]}
                const detections = data.detections || [data];
                detections.forEach(det => {
                    const [x1, y1, x2, y2] = det.bbox;
                    ctx.strokeStyle = '#00ff88';
                    ctx.lineWidth = 3;
                    ctx.strokeRect(x1, y1, x2 - x1, y2 - y1);

                    ctx.fillStyle = '#00ff88';
                    ctx.font = '16px Arial';
                    const label = `${det.class} ${(det.confidence * 100).toFixed(1)}%`;
                    const textWidth = ctx.measureText(label).width;
                    ctx.fillRect(x1, y1 - 20, textWidth + 10, 20);
                    ctx.fillStyle = '#000';
                    ctx.fillText(label, x1 + 5, y1 - 5);
                });
            };

            document.getElementById('image-result').innerHTML = `
                <div class="audio-result">
                    <div class="predicted-label">📦 ${(data.detections || [data]).length} object(s) detected</div>
                </div>
            `;
        }
    </script>
</body>
</html>
