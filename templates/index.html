<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PRAHAR</title>
</head>
<body>
    <h1>PRAHAR Dashboard</h1>
    
    <div>
        <input type="text" id="headline-input" placeholder="Enter a defense headline..." style="width: 400px; padding: 8px;">
        <button onclick="analyzeHeadline()">Analyze</button>
    </div>

    <div id="result"></div>

    <script>
        async function analyzeHeadline() {
            const text = document.getElementById('headline-input').value;
            const res = await fetch(`/api/analyze?text=${encodeURIComponent(text)}`);
            const data = await res.json();
            document.getElementById('result').innerText = JSON.stringify(data, null, 2);
        }
    </script>
</body>
</html>
